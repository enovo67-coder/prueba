<!DOCTYPE html>
<html>

<head>

<title>Oráculo de Arismendi</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>

body{
background:black;
color:white;
font-family:'Cinzel',serif;
text-align:center;
padding:60px;
}

textarea{
width:420px;
height:80px;
font-size:16px;
}

button{
padding:12px 24px;
margin-top:10px;
background:gold;
border:none;
cursor:pointer;
}

#respuesta{
margin-top:30px;
font-size:20px;
max-width:600px;
margin:auto;
white-space:pre-line;
}

</style>

</head>

<body>

<h1>El Oráculo de Arismendi</h1>

<p>Haz tu pregunta</p>

<textarea id="pregunta"></textarea>

<br>

<button onclick="consultar()">Consultar</button>

<div id="respuesta"></div>

<script>

/* FRASES DEL LIBRO */

let frases = [

"Las estrellas no determinan el destino del hombre, pero reflejan su camino interior.",

"Cuando la vida parece cerrarse, lo que debemos abrir es la mirada.",

"Las dificultades no son castigos sino señales que invitan a la transformación.",

"Quien solo mira lo visible pierde la mitad de la verdad.",

"La desesperación muchas veces es la antesala de un cambio.",

"El destino no está escrito en las estrellas sino en la forma en que aprendemos a mirar.",

"A veces la respuesta no está en cambiar el mundo sino en cambiar la forma en que lo miramos.",

"Los momentos de crisis suelen ser también momentos de revelación.",

"El camino del destino se revela paso a paso, nunca todo de una vez.",

"Quien aprende a escuchar las señales de la vida rara vez se pierde."

];


/* INTERPRETACIONES */

let interpretaciones = [

"El oráculo sugiere reflexionar sobre esta enseñanza.",

"Tal vez esta frase ilumina la situación que planteas.",

"Arismendi invita a mirar el problema desde otra perspectiva.",

"Esta enseñanza puede estar relacionada con el momento que atraviesas.",

"El consejo parece apuntar a un cambio de mirada."

];


/* ELEGIR FRASE */

function elegirFrase(){

return frases[Math.floor(Math.random()*frases.length)];

}


/* ELEGIR INTERPRETACION */

function interpretar(){

return interpretaciones[Math.floor(Math.random()*interpretaciones.length)];

}


/* CONSULTAR */

function consultar(){

let pregunta = document.getElementById("pregunta").value;

document.getElementById("respuesta").innerText =
"Consultando las enseñanzas de Arismendi...";

setTimeout(()=>{

let frase = elegirFrase();

let respuesta =
"Frase del libro:\n\n"+
frase+
"\n\n"+
interpretar();

document.getElementById("respuesta").innerText = respuesta;

},1200);

}

</script>

</body>

</html>
