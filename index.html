<!DOCTYPE html>
<html>

<head>

<title>Oráculo de Arismendi</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>

body{
background:black;
color:white;
font-family:'Cinzel',serif;
text-align:center;
padding:60px;
}

textarea{
width:400px;
height:80px;
font-size:16px;
}

button{
padding:12px 24px;
margin-top:10px;
background:gold;
border:none;
}

#respuesta{
margin-top:30px;
font-size:20px;
max-width:600px;
margin:auto;
}

</style>

</head>

<body>

<h1>El Oráculo de Arismendi</h1>

<p>Haz tu pregunta</p>

<textarea id="pregunta"></textarea>

<br>

<button onclick="consultar()">Consultar</button>

<div id="respuesta"></div>

<script>

let frases=[];

/* cargar frases del libro */

fetch("arismendi.json")
.then(r=>r.json())
.then(data=>{
frases=data;
});


function buscarFrases(pregunta){

let palabras=pregunta.toLowerCase().split(" ");

let resultados=[];

for(let frase of frases){

let score=0;

for(let p of palabras){

if(frase.toLowerCase().includes(p))
score++;

}

resultados.push({
frase:frase,
score:score
});

}

resultados.sort((a,b)=>b.score-a.score);

return resultados.slice(0,3).map(x=>x.frase);

}



async function consultar(){

let pregunta=document.getElementById("pregunta").value;

document.getElementById("respuesta").innerText=
"Consultando las enseñanzas de Arismendi...";

let citas=buscarFrases(pregunta).join("\n");

let prompt=`
Usa las enseñanzas del Profesor Arismendi
para responder a la pregunta.

Frases del libro:

${citas}

Pregunta:
${pregunta}

Responde con:

1 una frase del libro
2 interpretación
3 consejo breve
`;

let r=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 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"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{role:"system",content:"Eres el Oráculo del Profesor Arismendi"},
{role:"user",content:prompt}
]

})

});

let data=await r.json();

document.getElementById("respuesta").innerText=
data.choices[0].message.content;

}

</script>

</body>

</html>
