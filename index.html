<!DOCTYPE html>
<html>

<head>

<title>Oráculo de Arismendi</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>

body{
background:black;
color:white;
font-family:'Cinzel',serif;
text-align:center;
padding:60px;
}

textarea{
width:400px;
height:80px;
font-size:16px;
}

button{
padding:12px 24px;
margin-top:10px;
background:gold;
border:none;
}

#respuesta{
margin-top:30px;
font-size:20px;
max-width:600px;
margin:auto;
}

</style>

</head>

<body>

<h1>El Oráculo de Arismendi</h1>

<p>Haz tu pregunta</p>

<textarea id="pregunta"></textarea>

<br>

<button onclick="consultar()">Consultar</button>

<div id="respuesta"></div>

<script>

let frases=[];

fetch("arismendi.json")
.then(r=>r.json())
.then(data=>{
frases=data;
});


function buscarFrase(pregunta){

let palabras=pregunta.toLowerCase().split(" ");

let mejor="";
let mejorScore=0;

for(let frase of frases){

let score=0;

for(let p of palabras){

if(frase.toLowerCase().includes(p))
score++;

}

if(score>mejorScore){

mejorScore=score;
mejor=frase;

}

}

if(mejorScore===0){

mejor=frases[Math.floor(Math.random()*frases.length)];

}

return mejor;

}



function consultar(){

let pregunta=document.getElementById("pregunta").value;

document.getElementById("respuesta").innerText=
"Consultando las enseñanzas de Arismendi...";

setTimeout(()=>{

let frase=buscarFrase(pregunta);

document.getElementById("respuesta").innerText=

frase+"\n\nInterpretación:\n"+
"El oráculo sugiere reflexionar sobre esta enseñanza en relación con tu pregunta.";

},1200);

}

</script>

</body>

</html>
