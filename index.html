<!DOCTYPE html>
<html>

<head>

<title>El Oráculo de Arismendi</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>

body{
background:black;
color:white;
font-family:'Cinzel',serif;
text-align:center;
padding:60px;
}

textarea{
width:420px;
height:80px;
font-size:16px;
}

button{
padding:12px 24px;
margin-top:10px;
background:gold;
border:none;
cursor:pointer;
}

#respuesta{
margin-top:30px;
font-size:20px;
max-width:600px;
margin:auto;
white-space:pre-line;
}

</style>

</head>

<body>

<h1>El Oráculo de Arismendi</h1>

<p>Haz tu pregunta</p>

<textarea id="pregunta"></textarea>

<br>

<button onclick="consultar()">Consultar</button>

<div id="respuesta"></div>

<script>

let frases=[];

/* cargar archivo json */

async function cargarFrases(){

try{

let r=await fetch("arismendi.json");
frases=await r.json();

}catch(e){

console.log("No se pudo cargar el libro");

}

}

cargarFrases();


function elegirFrase(pregunta){

pregunta=pregunta.toLowerCase();

let mejores=[];

for(let item of frases){

let score=0;

let palabras=pregunta.split(" ");

for(let p of palabras){

if(item.frase.toLowerCase().includes(p))
score++;

}

mejores.push({
frase:item.frase,
score:score
});

}

mejores.sort((a,b)=>b.score-a.score);

if(mejores[0].score===0){

return frases[Math.floor(Math.random()*frases.length)].frase;

}

return mejores[0].frase;

}


function interpretacion(){

let textos=[

"El oráculo sugiere reflexionar sobre esta enseñanza.",
"Tal vez esta frase ilumina la situación que planteas.",
"Arismendi invita a mirar el problema desde otra perspectiva.",
"Esta enseñanza puede estar relacionada con el momento que atraviesas.",
"El consejo parece apuntar a un cambio de mirada."

];

return textos[Math.floor(Math.random()*textos.length)];

}


function consultar(){

if(frases.length===0){

document.getElementById("respuesta").innerText=
"El libro aún no ha sido cargado.";

return;

}

let pregunta=document.getElementById("pregunta").value;

document.getElementById("respuesta").innerText=
"Consultando las enseñanzas de Arismendi...";

setTimeout(()=>{

let frase=elegirFrase(pregunta);

let texto=

"Frase del libro:\n\n"+
frase+
"\n\n"+
interpretacion();

document.getElementById("respuesta").innerText=texto;

},1200);

}

</script>

</body>

</html>
