<!DOCTYPE html>
<html>

<head>

<title>Oráculo de Arismendi</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>

body{
background:black;
color:white;
font-family:'Cinzel',serif;
text-align:center;
padding:60px;
}

textarea{
width:400px;
height:80px;
font-size:16px;
}

button{
padding:12px 24px;
margin-top:10px;
background:gold;
border:none;
}

#respuesta{
margin-top:30px;
font-size:20px;
max-width:600px;
margin:auto;
white-space:pre-line;
}

</style>

</head>

<body>

<h1>El Oráculo de Arismendi</h1>

<p>Haz tu pregunta</p>

<textarea id="pregunta"></textarea>

<br>

<button onclick="consultar()">Consultar</button>

<div id="respuesta"></div>

<script>

let frases=[];

fetch("arismendi.json")
.then(r=>r.json())
.then(data=>{
frases=data;
});

function elegirFrases(){

let copia=[...frases];

copia.sort(()=>Math.random()-0.5);

return copia.slice(0,3);

}

function interpretar(pregunta){

let interpretaciones=[
"El oráculo sugiere reflexionar sobre esta enseñanza.",
"Tal vez esta frase ilumina la situación que planteas.",
"Arismendi invita a mirar el problema desde otra perspectiva.",
"Esta enseñanza puede estar relacionada con el momento que atraviesas.",
"El consejo parece apuntar a un cambio de mirada."
];

return interpretaciones[Math.floor(Math.random()*interpretaciones.length)];

}

function consultar(){

let pregunta=document.getElementById("pregunta").value;

document.getElementById("respuesta").innerText=
"Consultando las enseñanzas de Arismendi...";

setTimeout(()=>{

let seleccion=elegirFrases();

let frase=seleccion[0];

let interpretacion=interpretar(pregunta);

document.getElementById("respuesta").innerText=

"Frase del libro:\n\n"+
frase+
"\n\n"+
interpretacion;

},1200);

}

</script>

</body>

</html>
